name: Deploy to Hostgator via SFTP (App-only)

on:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  build-and-deploy:
    name: Build and Deploy App-only to sankara.net
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment directory (app repo only)
        run: |
          mkdir -p dist-pages
          cp index.html mission.html dist-pages/
          if [ -f .htaccess ]; then
            cp .htaccess dist-pages/
          fi
          cp -r assets dist-pages/
          cp -r src dist-pages/
          APP_ASSET_REV="${GITHUB_SHA::12}"
          mv dist-pages/src "dist-pages/src-${APP_ASSET_REV}"
          python - <<'PY'
          import os
          from pathlib import Path

          app_rev = os.environ["GITHUB_SHA"][:12]
          mission_html = Path("dist-pages/mission.html")
          text = mission_html.read_text(encoding="utf-8")
          text = text.replace("src/platform/", f"src-{app_rev}/platform/")
          mission_html.write_text(text, encoding="utf-8")
          print(f"Rewrote mission.html src path to src-{app_rev}/platform/")
          PY
          if [ -d images ]; then
            cp -r images dist-pages/
          fi
          if [ -d third-party ]; then
            cp -r third-party dist-pages/
          fi

      - name: Write deployment metadata (app-only)
        run: |
          python scripts/write-deployment-metadata.py \
            --output-root ./dist-pages \
            --app-root . \
            --data-root . \
            --site-url "https://sankara.net/astro/lunar-missions/"

      - name: Verify build artifacts
        run: |
          test -f dist-pages/index.html
          test -f dist-pages/mission.html
          test -d dist-pages/assets
          APP_ASSET_REV="${GITHUB_SHA::12}"
          test -d "dist-pages/src-${APP_ASSET_REV}/platform"
          if [ -d images ]; then
            test -d dist-pages/images
          fi
          test -f dist-pages/deployment/version.json
          test -f dist-pages/deployment/file-manifest.json

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Host *" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: Deploy app shell while preserving runtime data files
        run: |
          rsync -avz --delete \
            --filter='P assets/*/data/' \
            --filter='P assets/*/data/***' \
            --filter='P assets/*/images/' \
            --filter='P assets/*/images/***' \
            --filter='P images/' \
            --filter='P images/***' \
            --filter='P third-party/' \
            --filter='P third-party/***' \
            --filter='P deployment/runtime-asset-manifest.json' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SFTP_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
            ./dist-pages/ \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}

      - name: Deploy app-managed social images
        run: |
          if [ -d ./dist-pages/images/social ]; then
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SFTP_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
              ./dist-pages/images/social/ \
              ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_REMOTE_PATH }}/images/social/
          else
            echo "No app-managed social images present in dist-pages/images/social; skipping."
          fi
        timeout-minutes: 10

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deployment Summary
        run: |
          echo "✅ App-only deployment completed"
          echo "🌐 Site URL: https://sankara.net/astro/lunar-missions/"
          echo "📦 Runtime mission data under assets/*/data preserved on remote"
