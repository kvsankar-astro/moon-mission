name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual triggering

env:
  MISSION_DATA_REPO: ${{ vars.MISSION_DATA_REPO || 'kvsankar/moon-mission-data' }}
  MISSION_DATA_REF: ${{ vars.MISSION_DATA_REF || 'main' }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout mission data repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MISSION_DATA_REPO }}
          ref: ${{ env.MISSION_DATA_REF }}
          path: mission-data
          token: ${{ secrets.DATA_REPO_TOKEN || github.token }}

      - name: Prepare deployment directory
        run: |
          mkdir -p dist-pages
          # Copy HTML files
          cp index.html mission.html dist-pages/
          # Copy assets (mission data, JS, CSS)
          cp -r assets dist-pages/
          # Copy images (Earth/Moon textures)
          cp -r images dist-pages/
          # Copy third-party libraries
          cp -r third-party dist-pages/

      - name: Stage NPZ ephemeris artifacts
        run: |
          python scripts/stage-ephemeris-data.py \
            --app-root . \
            --data-root ./mission-data \
            --dist-root ./dist-pages

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist-pages'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
