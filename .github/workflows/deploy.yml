name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: |
          # Start Vite server in background with nohup
          nohup npx vite --port 8111 > vite.log 2>&1 &
          SERVER_PID=$!
          echo "Started Vite server with PID $SERVER_PID"

          # Wait for server to be ready (poll every second for up to 30 seconds)
          for i in {1..30}; do
            if curl -s http://localhost:8111 > /dev/null 2>&1; then
              echo "Server is ready after $i seconds"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done

          # Verify server is running
          curl -s http://localhost:8111 > /dev/null || (echo "Server failed to start" && cat vite.log && exit 1)

          # Run tests
          npx cross-env HEADLESS=true VITE_TEST_BASE_URL=http://localhost:8111 npx vitest test/ui.test.js --run

      - name: Prepare deployment directory
        run: |
          mkdir -p dist-pages
          # Copy HTML files
          cp index.html mission.html dist-pages/
          # Copy assets (mission data, JS, CSS)
          cp -r assets dist-pages/
          # Copy images (Earth/Moon textures)
          cp -r images dist-pages/
          # Copy third-party libraries
          cp -r third-party dist-pages/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist-pages'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
