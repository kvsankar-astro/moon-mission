name: Deploy to GitHub Pages

on:
  workflow_dispatch:  # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MISSION_DATA_REPO: ${{ vars.MISSION_DATA_REPO || 'kvsankar/moon-mission-data' }}
  MISSION_DATA_REF: ${{ vars.MISSION_DATA_REF || 'main' }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout mission data repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.MISSION_DATA_REPO }}
          ref: ${{ env.MISSION_DATA_REF }}
          path: mission-data

      - name: Regenerate data runtime asset manifest for current revisions
        run: |
          python scripts/generate-runtime-asset-manifest.py \
            --app-root . \
            --data-root ./mission-data \
            --output provenance/runtime-asset-manifest.json

      - name: Stage mission data for tests
        run: |
          python scripts/stage-ephemeris-data.py \
            --app-root . \
            --data-root ./mission-data \
            --target-root .

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout mission data repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.MISSION_DATA_REPO }}
          ref: ${{ env.MISSION_DATA_REF }}
          path: mission-data

      - name: Regenerate data runtime asset manifest for current revisions
        run: |
          python scripts/generate-runtime-asset-manifest.py \
            --app-root . \
            --data-root ./mission-data \
            --output provenance/runtime-asset-manifest.json

      - name: Prepare deployment directory
        run: |
          mkdir -p dist-pages
          # Copy HTML files
          cp index.html mission.html orbit-data.html assets-status.html moon-render-tuner.html sky-render-demo.html dist-pages/
          node scripts/generate-mission-pages.mjs --app-root . --output-root ./dist-pages --site-url "https://kvsankar.github.io/moon-mission/"
          if [ -f .htaccess ]; then
            cp .htaccess ./dist-pages/.htaccess
          fi
          # Copy mission assets/config and shared platform source
          cp -r assets dist-pages/
          cp -r src dist-pages/
          APP_ASSET_REV="${GITHUB_SHA::12}"
          mv dist-pages/src "dist-pages/src-${APP_ASSET_REV}"
          python - <<'PY'
          import os
          from pathlib import Path

          app_rev = os.environ["GITHUB_SHA"][:12]
          html_files = sorted(Path("dist-pages").glob("**/*.html"))
          for html_path in html_files:
              text = html_path.read_text(encoding="utf-8")
              text = text.replace("src/platform/", f"src-{app_rev}/platform/")
              html_path.write_text(text, encoding="utf-8")
              print(f"Rewrote {html_path} src path to src-{app_rev}/platform/")
          PY

      - name: Stage mission runtime data assets
        run: |
          python scripts/stage-ephemeris-data.py \
            --app-root . \
            --data-root ./mission-data \
            --target-root ./dist-pages
          if [ -d images ]; then
            cp -r images dist-pages/
          fi
          if [ -d third-party ]; then
            cp -r third-party dist-pages/
          fi
          if [ -d images/social ]; then
            mkdir -p dist-pages/images/social
            cp -r images/social/. dist-pages/images/social/
          fi

      - name: Write deployment version and manifest metadata
        run: |
          mkdir -p dist-pages/deployment
          cp mission-data/provenance/runtime-asset-manifest.json dist-pages/deployment/runtime-asset-manifest.json
          python scripts/write-deployment-metadata.py \
            --output-root ./dist-pages \
            --app-root . \
            --data-root ./mission-data \
            --site-url "https://kvsankar.github.io/moon-mission/"

      - name: Verify staged runtime assets against manifest (existence + SHA)
        run: |
          python scripts/verify-staged-runtime-assets.py \
            --staged-root ./dist-pages \
            --runtime-manifest ./dist-pages/deployment/runtime-asset-manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist-pages'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
