<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lunar Mission Animations based on NASA JPL Horizons ephemeris data">
    <meta property="og:url" content="https://sankara.net/astro/lunar-missions/index.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Lunar Mission Animations">
    <meta property="og:description" content="Interactive 2D/3D lunar mission orbit visualizations from JPL HORIZONS data">
    <meta property="og:image" content="https://sankara.net/astro/lunar-missions/images/social/index-social.png">
    <meta property="og:image:width" content="1040">
    <meta property="og:image:height" content="1076">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="sankara.net">
    <meta property="twitter:url" content="https://sankara.net/astro/lunar-missions/index.html">
    <meta name="twitter:title" content="Lunar Mission Animations">
    <meta name="twitter:description" content="Interactive 2D/3D lunar mission orbit visualizations from JPL HORIZONS data">
    <meta name="twitter:image" content="https://sankara.net/astro/lunar-missions/images/social/index-social.png">
    <title>Lunar Mission Animations</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0a15;
            color: #d9e2ff;
            font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
        }

        .landing-shell {
            width: min(2200px, calc(100vw - 24px));
            max-width: 2200px;
            margin: 34px auto 48px auto;
            padding: 20px 24px 36px 24px;
            box-sizing: border-box;
        }

        .landing-topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .landing-title {
            color: #ffa000;
            margin: 0 0 8px 0;
            font-size: 36px;
            line-height: 1.15;
        }

        .landing-subtitle {
            color: #9aa7c7;
            margin: 0;
            font-weight: 500;
            font-size: 16px;
        }

        .landing-view-picker {
            display: inline-flex;
            gap: 6px;
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #253055;
            background: rgba(12, 19, 38, 0.85);
        }

        .landing-top-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .landing-view-button {
            border: 1px solid #2f3b66;
            background: rgba(20, 31, 58, 0.9);
            color: #c9d5f3;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
        }

        .landing-view-button--active {
            color: #0b1530;
            border-color: #6da5ff;
            background: linear-gradient(135deg, #8fb8ff, #66d2ff);
        }

        .landing-toplink {
            display: inline-flex;
            align-items: center;
            border: 1px solid #30406f;
            background: rgba(18, 29, 55, 0.95);
            color: #dce7ff;
            border-radius: 999px;
            padding: 9px 13px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .landing-toplink:hover {
            border-color: #6da5ff;
            color: #ffffff;
        }

        .landing-sort-controls {
            display: none;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            color: #a9b6d6;
            font-size: 12px;
        }

        .landing-sort-controls label {
            color: #9eb0d8;
        }

        .landing-sort-controls select {
            background: rgba(16, 27, 53, 0.95);
            border: 1px solid #30406f;
            color: #d7e2ff;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
        }

        .landing-sort-controls button {
            background: rgba(16, 27, 53, 0.95);
            border: 1px solid #30406f;
            color: #d7e2ff;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .landing-sort-controls button:hover {
            border-color: #5f7dc9;
            color: #eef4ff;
        }

        .landing-column-selector {
            position: relative;
            display: none;
        }

        .landing-column-selector__summary {
            list-style: none;
            background: rgba(16, 27, 53, 0.95);
            border: 1px solid #30406f;
            color: #d7e2ff;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        .landing-column-selector__summary::-webkit-details-marker {
            display: none;
        }

        .landing-column-selector[open] .landing-column-selector__summary,
        .landing-column-selector__summary:hover {
            border-color: #5f7dc9;
            color: #eef4ff;
        }

        .landing-column-selector__panel {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 220px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #30406f;
            background: rgba(10, 17, 34, 0.98);
            box-shadow: 0 10px 28px rgba(5, 9, 19, 0.4);
            z-index: 30;
        }

        .landing-column-selector[open] .landing-column-selector__panel {
            display: grid;
            gap: 8px;
        }

        .landing-column-selector__hint {
            color: #90a3cf;
            font-size: 11px;
        }

        .landing-column-selector__options {
            display: grid;
            gap: 6px;
        }

        .landing-column-selector__option {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d7e2ff;
            font-size: 12px;
            white-space: nowrap;
        }

        .landing-column-selector__option input {
            margin: 0;
            accent-color: #6da5ff;
        }

        .landing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px;
        }

        .landing-default-lanes {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .landing-lane {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .landing-lane__title {
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8fa8dc;
        }

        .landing-card {
            display: block;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #2d3b67;
            padding: 14px 14px 13px 14px;
            background: rgba(16, 24, 46, 0.92);
            color: #dde6ff;
            transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
        }

        .landing-card:hover {
            transform: translateY(-2px);
            border-color: #6da5ff;
            box-shadow: 0 8px 24px rgba(35, 73, 148, 0.25);
        }

        .landing-card__title {
            margin: 0 0 7px 0;
            font-size: 16px;
            font-weight: 700;
        }

        .landing-flag {
            font-size: 0.72em;
            margin-right: 6px;
            opacity: 0.92;
            vertical-align: 1px;
        }

        .landing-card__meta {
            margin: 0 0 8px 0;
            color: #91a3cc;
            font-size: 12px;
        }

        .landing-card__desc {
            margin: 0;
            color: #aebcdf;
            font-size: 13px;
            line-height: 1.35;
        }

        .landing-card__actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .landing-grid--orbits {
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
        }

        .landing-card--orbit {
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 16px;
            cursor: default;
        }

        .landing-card--orbit:hover {
            transform: translateY(-2px);
        }

        .landing-card__preview {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1 1 auto;
            min-height: 0;
        }

        .landing-card__preview-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .landing-card__preview-host {
            margin: 0;
            border: 1px solid #2c3d63;
            border-radius: 10px;
            background: rgba(9, 15, 31, 0.98);
            min-height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            color: #9bb0da;
            font-size: 12px;
            text-align: center;
            padding: 6px;
            box-sizing: border-box;
        }

        .landing-card__preview-host .landing-brief-orbit-time {
            margin-top: 4px;
        }

        .landing-card__preview-host .landing-brief-orbit-timeline {
            max-width: 308px;
        }

        .landing-card__preview-meta {
            margin: 0 0 10px 0;
            color: #91a3cc;
            font-size: 12px;
        }

        .landing-card--orbit .landing-card__actions {
            margin-top: 12px;
            justify-content: space-between;
            align-items: center;
        }

        .landing-card__btn {
            border: 1px solid #334673;
            color: #d3ddf5;
            background: rgba(16, 26, 51, 0.95);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .landing-card__btn--launch {
            background: rgba(22, 36, 66, 0.95);
            color: #d9e6ff;
            border-color: #456498;
        }

        .landing-card__btn:hover {
            border-color: #5f7eb4;
        }

        .landing-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .landing-kpi {
            border: 1px solid #2a3760;
            border-radius: 12px;
            background: rgba(13, 22, 42, 0.9);
            padding: 12px;
        }

        .landing-kpi__label {
            margin: 0 0 4px 0;
            color: #8fa1ca;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .landing-kpi__value {
            margin: 0;
            color: #e6eeff;
            font-size: 20px;
            font-weight: 700;
        }

        .landing-table-wrap {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
            border: 1px solid #2b3a63;
            border-radius: 12px;
            background: rgba(13, 21, 40, 0.88);
            scrollbar-gutter: stable both-edges;
        }

        .landing-table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        .landing-table th[data-col-key="mission"],
        .landing-table td[data-col-key="mission"] {
            min-width: 150px;
        }

        .landing-table th[data-col-key="country"],
        .landing-table td[data-col-key="country"],
        .landing-table th[data-col-key="craft"],
        .landing-table td[data-col-key="craft"] {
            min-width: 88px;
            width: 1%;
        }

        .landing-table th[data-col-key="launch"],
        .landing-table td[data-col-key="launch"],
        .landing-table th[data-col-key="tli"],
        .landing-table td[data-col-key="tli"],
        .landing-table th[data-col-key="loi"],
        .landing-table td[data-col-key="loi"],
        .landing-table th[data-col-key="landing"],
        .landing-table td[data-col-key="landing"],
        .landing-table th[data-col-key="dataStart"],
        .landing-table td[data-col-key="dataStart"],
        .landing-table th[data-col-key="dataEnd"],
        .landing-table td[data-col-key="dataEnd"] {
            min-width: 92px;
            width: 1%;
        }

        .landing-table th[data-col-key="crew"],
        .landing-table td[data-col-key="crew"],
        .landing-table th[data-col-key="dataDuration"],
        .landing-table td[data-col-key="dataDuration"],
        .landing-table th[data-col-key="duration"],
        .landing-table td[data-col-key="duration"] {
            min-width: 56px;
            width: 1%;
        }

        .landing-table th[data-col-key="timeline"],
        .landing-table td[data-col-key="timeline"] {
            min-width: 44px;
            width: 1%;
        }

        .landing-table th,
        .landing-table td {
            padding: 4px 5px;
            border-bottom: 1px solid #263457;
            text-align: left;
            font-size: 9px;
            line-height: 1.15;
            white-space: nowrap;
        }

        .landing-table th {
            color: #a9b9df;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(20, 31, 58, 0.85);
        }

        .landing-table th.is-active-sort {
            background: rgba(29, 46, 84, 0.96);
            box-shadow: inset 0 -1px 0 #6ea6ff;
        }

        .landing-table-sort {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0;
            border: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            text-transform: inherit;
            letter-spacing: inherit;
            cursor: pointer;
        }

        .landing-table-sort:hover {
            color: #dfe8ff;
        }

        .landing-table-sort.is-active {
            color: #f3f7ff;
        }

        .landing-table-sort__indicator {
            display: inline-block;
            min-width: 9px;
            color: #7f93c0;
        }

        .landing-table-sort.is-active .landing-table-sort__indicator {
            color: #9bc0ff;
        }

        .landing-table td {
            color: #dce6ff;
        }

        .landing-table-mission-cell {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .landing-table-mission-title {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .landing-table-mission-actions {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            flex: 0 0 auto;
        }

        .landing-table a {
            color: #8db9ff;
            text-decoration: none;
            font-weight: 600;
        }

        .landing-table-action {
            border: 1px solid #31456e;
            color: #d3ddf5;
            background: rgba(17, 27, 52, 0.95);
            border-radius: 6px;
            padding: 2px 5px;
            font-size: 9px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .landing-timeline-group {
            margin-bottom: 14px;
            border-left: 2px solid #2f4376;
            padding-left: 12px;
        }

        .landing-timeline-year {
            margin: 0 0 8px 0;
            color: #f7c16b;
            font-size: 16px;
            font-weight: 700;
        }

        .landing-timeline-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .landing-timeline-chip-wrap {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }

        .landing-timeline-chip {
            display: inline-block;
            text-decoration: none;
            border: 1px solid #35508f;
            border-radius: 999px;
            background: rgba(17, 29, 57, 0.95);
            color: #dce6ff;
            font-size: 12px;
            padding: 6px 10px;
            cursor: pointer;
        }

        .landing-timeline-chip-launch {
            display: inline-block;
            border: 1px solid #35508f;
            border-radius: 999px;
            background: rgba(17, 29, 57, 0.95);
            color: #8db9ff;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            padding: 5px 8px;
        }

        .landing-brief-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 8, 21, 0.62);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1300;
        }

        .landing-brief-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            width: min(1240px, 96vw);
            max-height: 92vh;
            background: rgba(8, 15, 32, 0.98);
            border: 1px solid #2c3b63;
            border-radius: 14px;
            box-shadow: 0 26px 52px rgba(5, 10, 24, 0.62);
            transform: translate(-50%, -46%) scale(0.98);
            opacity: 0;
            transition: transform 0.22s ease, opacity 0.22s ease;
            z-index: 1301;
            overflow-y: auto;
            padding: 16px 16px 14px 16px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .landing-brief-panel.is-open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .landing-brief-overlay.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .landing-brief-header {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(48, 67, 104, 0.72);
            padding-bottom: 10px;
        }

        .landing-brief-header-left {
            min-width: 0;
        }

        .landing-brief-title-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            min-width: 0;
            flex-wrap: wrap;
        }

        .landing-brief-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .landing-brief-counter {
            font-size: 12px;
            color: #a8b9dd;
            letter-spacing: 0.03em;
        }

        .landing-brief-title {
            margin: 0;
            font-size: 24px;
            color: #ecf2ff;
            line-height: 1.2;
            flex: 1 1 300px;
            min-width: 0;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        .landing-brief-header-launch {
            flex-shrink: 0;
            font-size: 12px;
            padding: 6px 10px;
            align-self: baseline;
        }

        .landing-brief-nav {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }

        .landing-brief-nav-btn,
        .landing-brief-close {
            border: 1px solid #334871;
            background: rgba(21, 33, 61, 0.95);
            color: #d5def5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 10px;
            min-height: 32px;
            white-space: nowrap;
        }

        .landing-brief-close {
            font-size: 16px;
            width: 34px;
            padding: 0;
        }

        .landing-brief-nav-btn:hover,
        .landing-brief-close:hover {
            border-color: #5a79af;
            background: rgba(28, 43, 78, 0.96);
        }

        .landing-brief-body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .landing-brief-col {
            min-width: 0;
        }

        .landing-brief-col--text {
            max-height: calc(92vh - 190px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .landing-brief-col--viz {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .landing-brief-meta {
            margin: 0 0 12px 0;
            font-size: 12px;
            color: #9db0d9;
        }

        .landing-brief-hero {
            margin: 0 0 8px 0;
            border: 1px solid #2a3a63;
            border-radius: 10px;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(20, 30, 55, 0.96), rgba(10, 16, 31, 0.96));
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }

        .landing-brief-hero img {
            display: block;
            width: 100%;
            height: 250px;
            object-fit: contain;
            object-position: center;
            background: transparent;
        }

        .landing-brief-carousel {
            margin: 0 0 14px 0;
        }

        .landing-brief-carousel-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 8px 0 6px 0;
        }

        .landing-brief-carousel-btn {
            border: 1px solid #334871;
            background: rgba(21, 33, 61, 0.95);
            color: #d5def5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 10px;
            min-width: 40px;
            min-height: 30px;
        }

        .landing-brief-carousel-btn:hover {
            border-color: #5a79af;
            background: rgba(28, 43, 78, 0.96);
        }

        .landing-brief-carousel-counter {
            font-size: 12px;
            color: #a8b9dd;
            letter-spacing: 0.03em;
        }

        .landing-brief-attribution {
            margin: 0 0 14px 0;
            font-size: 11px;
            color: #9eb1db;
            line-height: 1.35;
        }

        .landing-brief-section-title {
            margin: 0 0 6px 0;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8ea6d6;
        }

        .landing-brief-orbit-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .landing-brief-orbit-controls {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .landing-brief-segmented {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px;
            border-radius: 999px;
            border: 1px solid #30406c;
            background: rgba(16, 26, 48, 0.94);
        }

        .landing-brief-segmented__btn {
            border: 1px solid transparent;
            background: transparent;
            color: #c6d4f0;
            border-radius: 999px;
            padding: 3px 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            min-width: 34px;
        }

        .landing-brief-segmented__btn.is-active {
            color: #091325;
            border-color: #6da5ff;
            background: linear-gradient(135deg, #8fb8ff, #66d2ff);
        }

        .landing-brief-segmented__btn:disabled {
            opacity: 0.44;
            cursor: default;
        }

        .landing-brief-summary {
            margin: 0 0 14px 0;
            font-size: 14px;
            line-height: 1.45;
            color: #dbe5ff;
        }

        .landing-brief-summary--compact {
            margin-bottom: 8px;
            font-size: 12px;
            color: #b9caea;
        }

        .landing-brief-list {
            margin: 0 0 14px 0;
            padding-left: 20px;
            color: #dbe5ff;
            font-size: 14px;
            line-height: 1.45;
        }

        .landing-brief-list li {
            margin: 0 0 6px 0;
        }

        .landing-brief-summary a,
        .landing-brief-list a,
        .landing-brief-source a,
        .landing-brief-attribution a {
            color: #8db8ff;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .landing-brief-timeline-block {
            margin: 0 0 14px 0;
            display: grid;
            gap: 8px;
        }

        .landing-brief-timeline-row {
            display: grid;
            gap: 4px;
        }

        .landing-brief-timeline-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }

        .landing-brief-timeline-label {
            font-size: 12px;
            color: #b8c9ea;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .landing-brief-timeline-range {
            font-size: 11px;
            color: #8ea4d2;
        }

        .landing-brief-timeline-bar {
            position: relative;
            height: 8px;
            border-radius: 999px;
            background: rgba(36, 53, 84, 0.7);
            border: 1px solid rgba(53, 78, 120, 0.65);
            overflow: hidden;
        }

        .landing-brief-timeline-bar.is-unavailable {
            background: repeating-linear-gradient(
                135deg,
                rgba(44, 62, 94, 0.5) 0px,
                rgba(44, 62, 94, 0.5) 6px,
                rgba(28, 41, 66, 0.5) 6px,
                rgba(28, 41, 66, 0.5) 12px
            );
        }

        .landing-brief-timeline-segment {
            position: absolute;
            top: 0;
            bottom: 0;
            border-radius: 999px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.35) inset;
            opacity: 0.95;
        }

        .landing-brief-highlights {
            margin: 0 0 14px 0;
            padding-left: 18px;
            color: #cfdbf8;
            font-size: 13px;
            line-height: 1.38;
        }

        .landing-brief-source {
            margin: 0 0 14px 0;
            font-size: 12px;
            color: #9eb0d8;
            word-break: break-all;
        }

        .landing-brief-orbit-empty {
            border: 1px dashed #35507f;
            border-radius: 10px;
            background: rgba(13, 21, 41, 0.72);
            color: #9cb1dc;
            font-size: 12px;
            line-height: 1.45;
            padding: 12px;
        }

        .landing-brief-orbit-anim {
            margin: 0 0 10px 0;
            border: 1px solid #2c3d63;
            border-radius: 10px;
            background: rgba(9, 15, 31, 0.98);
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            color: #9bb0da;
            font-size: 12px;
            text-align: center;
            padding: 6px;
            box-sizing: border-box;
        }

        .landing-brief-orbit-anim svg {
            width: 100%;
            max-width: 308px;
            height: auto;
            display: block;
        }

        .landing-brief-orbit-time {
            display: block;
            width: 100%;
            margin-top: 6px;
            color: #aec2e8;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-align: center;
        }

        .landing-brief-orbit-timeline {
            width: 100%;
            max-width: 308px;
            padding: 2px 4px 0 4px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .landing-brief-orbit-track {
            position: relative;
            width: 100%;
            height: 2px;
            border-radius: 999px;
            background: rgba(124, 151, 198, 0.35);
            overflow: visible;
        }

        .landing-brief-orbit-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0%;
            border-radius: 999px;
            background: rgba(248, 184, 75, 0.55);
        }

        .landing-brief-orbit-thumb {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            transform: translate(-50%, -50%);
            background: #ffd67a;
            border: 1px solid #fff2c8;
            box-shadow: 0 0 8px rgba(255, 214, 122, 0.35);
        }

        .landing-brief-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(44, 61, 99, 0.7);
        }

        .landing-brief-actions-left {
            display: inline-flex;
            gap: 8px;
            align-items: center;
        }

        .landing-brief-actions-right {
            display: inline-flex;
            gap: 8px;
            align-items: center;
        }

        .landing-brief-actions .landing-card__btn {
            padding: 8px 12px;
            font-size: 12px;
        }

        .landing-footer {
            color: #64759d;
            margin-top: 24px;
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 700px) {
            .landing-shell { margin-top: 20px; padding: 14px; }
            .landing-title { font-size: 27px; }
            .landing-subtitle { font-size: 14px; }
            .landing-brief-panel {
                width: 96vw;
                max-height: 94vh;
                padding: 12px;
            }
            .landing-brief-title { font-size: 20px; }
            .landing-brief-header-right { gap: 5px; }
            .landing-brief-nav-btn {
                font-size: 11px;
                padding: 5px 8px;
            }
            .landing-brief-title-row {
                gap: 6px;
                align-items: flex-start;
                flex-wrap: wrap;
            }
            .landing-brief-header-launch {
                font-size: 11px;
                padding: 5px 8px;
                align-self: flex-start;
            }
        }

        @media (max-width: 960px) {
            .landing-brief-body {
                grid-template-columns: 1fr;
            }

            .landing-brief-col--text {
                max-height: none;
                overflow: visible;
                padding-right: 0;
            }

            .landing-brief-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="landing-shell">
        <div class="landing-topbar">
            <div>
                <h1 class="landing-title">Lunar Mission Animations</h1>
                <h2 class="landing-subtitle">Based on NASA JPL HORIZONS ephemeris data, with ESA SPICE kernels for Chandrayaan 1</h2>
            </div>
            <div class="landing-top-actions">
                <div class="landing-view-picker" role="group" aria-label="Landing page view picker">
                    <button class="landing-view-button landing-view-button--active" data-view="default" type="button">Default</button>
                    <button class="landing-view-button" data-view="orbits" type="button">Orbits</button>
                    <button class="landing-view-button" data-view="tiles" type="button">Tiles</button>
                    <button class="landing-view-button" data-view="table" type="button">Table</button>
                    <button class="landing-view-button" data-view="timeline" type="button">Timeline</button>
                </div>
                <a class="landing-toplink" href="orbit-data.html">Orbit Data Status</a>
            </div>
        </div>

        <div id="landing-sort-controls" class="landing-sort-controls">
            <label for="landing-filter-craft">Filter</label>
            <select id="landing-filter-craft">
                <option value="">All Craft Classes</option>
            </select>
            <select id="landing-filter-crew">
                <option value="">All Crew Profiles</option>
            </select>
            <button id="landing-controls-reset" type="button">Reset</button>
            <details id="landing-column-selector" class="landing-column-selector">
                <summary id="landing-column-summary" class="landing-column-selector__summary">Columns</summary>
                <div class="landing-column-selector__panel">
                    <div class="landing-column-selector__hint">Mission and Actions stay pinned on.</div>
                    <div id="landing-column-options" class="landing-column-selector__options"></div>
                </div>
            </details>
        </div>

        <div id="landing-view-root"></div>

    </div>
    <div id="landing-brief-overlay" class="landing-brief-overlay" aria-hidden="true"></div>
    <aside id="landing-brief-panel" class="landing-brief-panel" aria-hidden="true"></aside>

    <script src="src/platform/js/index-landing.js"></script>
</body>
</html>
