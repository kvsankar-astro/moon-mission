    <title>Redirecting to Artemis 2 Mission</title>
    <script>
        (function() {
            const target = new URL("../mission.html", window.location.href);
            const params = new URLSearchParams(window.location.search);
            if (!params.has("mission")) params.set("mission", "artemis2");
            target.search = params.toString();
            target.hash = window.location.hash || "";
            window.location.replace(target.toString());
        })();
